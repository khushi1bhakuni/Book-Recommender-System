<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommend Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#121212;
            color:white;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        /* Navbar */
        .navbar{
            background:linear-gradient(90deg,#00b894,#00cec9);
            padding:15px 40px;
            position:relative;
        }

        .navbar .container{
            position:relative;
        }

        .navbar-brand{
            position:absolute;
            left:50%;
            transform:translateX(-50%);
            font-size:30px;
            font-weight:bold;
            color:white !important;
            letter-spacing:1px;
            margin:0;
        }

        .nav-link{
            color:white !important;
            margin-left:18px;
            font-weight:500;
            padding:8px 14px;
            transition:.3s;
        }

        .nav-link:hover{
            color:#222 !important;
        }

        /* Page Heading */
        .page-title{
            font-size:42px;
            font-weight:bold;
            margin:55px 0 20px;
            text-align:center;
        }

        /* Search Box */
        .search-box{
            max-width:700px;
            margin:0 auto 50px;
        }

        .form-control{
            background:#1f1f1f;
            border:2px solid #00b894;
            color:white;
            border-radius:12px;
            padding:15px;
            font-size:18px;
        }

        .form-control:focus{
            background:#1f1f1f;
            color:white;
            border-color:#00cec9;
            box-shadow:0 0 15px rgba(0,206,201,.35);
        }

        .form-control::placeholder{
            color:#b2bec3;
        }

        .btn-search{
            background:#00b894;
            color:white;
            border:none;
            border-radius:12px;
            padding:12px 40px;
            font-size:18px;
            font-weight:600;
            transition:.3s;
        }

        .btn-search:hover{
            background:#00cec9;
            color:#222;
            transform:translateY(-2px);
        }

        /* Cards */
        .book-card{
            background:#1f1f1f;
            border:none;
            border-radius:15px;
            overflow:hidden;
            transition:.3s ease;
            box-shadow:0 8px 20px rgba(0,0,0,.3);
            height:100%;
        }

        .book-card:hover{
            transform:translateY(-10px);
            box-shadow:0 15px 35px rgba(0,184,148,.4);
        }

        .book-card img{
            height:330px;
            width:100%;
            object-fit:cover;
        }

        .card-body{
            padding:20px;
        }

        .book-title{
            font-size:19px;
            font-weight:600;
            color:white;
            min-height:55px;
            margin-bottom:10px;
        }

        .author{
            color:#b2bec3;
            margin-bottom:0;
        }

        .container{
            margin-bottom:60px;
            padding:0 20px;
        }

        @media(max-width:991px){

            .navbar-brand{
                position:static;
                transform:none;
                display:block;
                text-align:center;
                margin-bottom:10px;
            }

            .navbar-collapse{
                text-align:center;
            }

            .nav-link{
                margin-left:0;
            }
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="#">
            Book Recommender
        </a>

        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse justify-content-end"
             id="navbarNav">

            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/recommend">Recommend</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container">

    <h1 class="page-title">
        Recommend Books
    </h1>

    <div class="search-box">

        <form action="/recommend_books" method="POST">

            <input
                name="user_input"
                type="text"
                class="form-control"
                placeholder="Enter a book title...">

            <div class="text-center mt-4">

                <input
                    type="submit"
                    value="Find Similar Books"
                    class="btn btn-search">

            </div>

        </form>

    </div>

    {% if data %}

    <div class="row g-4">

        {% for i in data %}

        <div class="col-lg-3 col-md-4 col-sm-6">

            <div class="card book-card">

                <img src="{{ i[2] }}"
                     class="card-img-top"
                     alt="{{ i[0] }}">

                <div class="card-body">

                    <h5 class="book-title">
                        {{ i[0] }}
                    </h5>

                    <p class="author">
                        {{ i[1] }}
                    </p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
